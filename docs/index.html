<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Love letter for crush</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap"
  rel="stylesheet" />

<style>
  html {
    scroll-behavior: smooth;
  }

  #envelope {
    position: relative;
    width: 280px;
    height: 180px;
    border-bottom-left-radius: 6px;
    border-bottom-right-radius: 6px;
    margin-left: auto;
    margin-right: auto;
    top: 150px;
    background-color: #d9534f; /* Warm romantic red */
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    cursor: pointer;
  }

  .front {
    position: absolute;
    width: 0;
    height: 0;
    z-index: 3;
  }

  .flap {
    border-left: 140px solid transparent;
    border-right: 140px solid transparent;
    border-bottom: 82px solid transparent;
    border-top: 98px solid #d9534f; /* Same romantic red */
    transform-origin: top;
    pointer-events: none;
  }

  .pocket {
    border-left: 140px solid #f5a3a2; /* Soft pinkish red for the pocket */
    border-right: 140px solid #f5a3a2;
    border-bottom: 90px solid #ff6f61; /* Lighter romantic red */
    border-top: 90px solid transparent;
    border-bottom-left-radius: 6px;
    border-bottom-right-radius: 6px;
  }

  .letter {
    position: relative;
    background-color: #fff;
    width: 90%;
    margin-left: auto;
    margin-right: auto;
    height: 90%;
    top: 5%;
    border-radius: 6px;
    box-shadow: 0 2px 26px rgba(0, 0, 0, 0.12);
    font-family: "Dancing Script", cursive;
  }

  .letter:after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
  }

  .words {
    position: absolute;
    left: 10%;
    width: 80%;
    height: 14%;
    background-color: #ffe6e6; /* Light romantic tone */
  }

  .words.line1 {
    top: 10%;
    width: 20%;
    height: 7%;
    font-size: 0.7rem;
  }

  .words.line2 {
    top: 30%;
    text-align: center;
    font-size: 1.1rem;
  }

  .words.line3 {
    top: 50%;
    font-size: 1.1rem;
    text-align: center;
  }

  .words.line4 {
    top: 70%;
    font-size: 1.1rem;
    text-align: center;
  }

  .open .flap {
    transform: rotateX(180deg);
    transition: transform 0.4s ease, z-index 0.6s;
    z-index: 1;
  }

  .close .flap {
    transform: rotateX(0deg);
    transition: transform 0.4s 0.6s ease, z-index 1s;
    z-index: 5;
  }

  .close .letter {
    transform: translateY(0px);
    transition: transform 0.4s ease, z-index 1s;
    z-index: 1;
  }

  .open .letter {
    transform: translateY(-100px);
    transition: transform 0.4s 0.6s ease, z-index 0.6s;
    z-index: 2;
  }

  .hearts {
    position: absolute;
    top: 90px;
    left: 0;
    right: 0;
    z-index: 2;
  }

  .heart {
    position: absolute;
    bottom: 0;
    right: 10%;
    pointer-events: none;
  }

  .heart:before,
  .heart:after {
    position: absolute;
    content: "";
    left: 50px;
    top: 0;
    width: 50px;
    height: 80px;
    background: #e60073; /* Deep romantic pink */
    border-radius: 50px 50px 0 0;
    transform: rotate(-45deg);
    transform-origin: 0 100%;
    pointer-events: none;
  }

  .heart:after {
    left: 0;
    transform: rotate(45deg);
    transform-origin: 100% 100%;
  }

  .close .heart {
    opacity: 0;
    -webkit-animation: none;
    animation: none;
  }

  .a1 {
    left: 20%;
    transform: scale(0.6);
    opacity: 1;
    -webkit-animation: slideUp 4s linear 1, sideSway 2s ease-in-out 4 alternate;
    animation: slideUp 4s linear 1, sideSway 2s ease-in-out 4 alternate;
    animation-fill-mode: forwards;
    animation-delay: 0.7s;
  }

  .a2 {
    left: 55%;
    transform: scale(1);
    opacity: 1;
    -webkit-animation: slideUp 5s linear 1, sideSway 4s ease-in-out 2 alternate;
    animation: slideUp 5s linear 1, sideSway 4s ease-in-out 2 alternate;
    animation-fill-mode: forwards;
    animation-delay: 0.7s;
  }

  .a3 {
    left: 10%;
    transform: scale(0.8);
    opacity: 1;
    -webkit-animation: slideUp 7s linear 1, sideSway 2s ease-in-out 6 alternate;
    animation: slideUp 7s linear 1, sideSway 2s ease-in-out 6 alternate;
    animation-fill-mode: forwards;
    animation-delay: 0.7s;
  }

  @keyframes slideUp {
    0% { top: 0; }
    100% { top: -600px; }
  }
  @keyframes sideSway {
    0% { margin-left: 0px; }
    100% { margin-left: 50px; }
  }

  body {
    background-color: #f0e6f6; /* Soft lavender for a romantic, dreamy feel */
    margin: 0;
    font-family: "Dancing Script", cursive;
  }

  .envlope-wrapper {
    height: 380px;
  }

  .reset {
    text-align: center;
  }

  .reset button {
    font-weight: 800;
    font-style: normal;
    transition: all 0.1s linear;
    -webkit-appearance: none;
    background-color: transparent;
    border: solid 2px #d9534f;
    border-radius: 4px;
    color: #d9534f;
    display: inline-block;
    font-size: 14px;
    text-transform: uppercase;
    margin: 5px;
    padding: 10px;
    line-height: 1em;
    text-decoration: none;
    min-width: 120px;
    cursor: pointer;
  }

  .reset button:hover {
    background-color: #d9534f;
    color: #fff;
  }

  /* --- Floating background hearts --- */
  #bg-hearts {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }

  .bg-heart {
    position: absolute;
    bottom: -60px;
    width: 20px;
    height: 20px;
    opacity: 0.55;
    animation-name: floatUp, sway;
    animation-timing-function: linear, ease-in-out;
    animation-iteration-count: infinite, infinite;
    animation-direction: normal, alternate;
  }

  .bg-heart:before,
  .bg-heart:after {
    position: absolute;
    content: "";
    left: 10px;
    top: 0;
    width: 10px;
    height: 16px;
    background: #e60073;
    border-radius: 10px 10px 0 0;
    transform: rotate(-45deg);
    transform-origin: 0 100%;
  }

  .bg-heart:after {
    left: 0;
    transform: rotate(45deg);
    transform-origin: 100% 100%;
  }

  @keyframes floatUp {
    0% {
      bottom: -60px;
      opacity: 0;
    }
    10% {
      opacity: 0.55;
    }
    90% {
      opacity: 0.55;
    }
    100% {
      bottom: 110%;
      opacity: 0;
    }
  }

  @keyframes sway {
    0% { margin-left: -20px; }
    100% { margin-left: 20px; }
  }

  /* keep real content above the floating hearts layer */
  .envlope-wrapper,
  .reset,
  .scroll-hint,
  #more-section {
    position: relative;
    z-index: 1;
  }

  /* --- Music button --- */
  #music-toggle {
    border-color: #e60073;
    color: #e60073;
  }
  #music-toggle:hover {
    background-color: #e60073;
    color: #fff;
  }

  /* --- Scroll-down hint --- */
  .scroll-hint {
    text-align: center;
    margin-top: 10px;
  }

  .scroll-hint a {
    display: inline-block;
    color: #d9534f;
    text-decoration: none;
    font-size: 2rem;
    animation: bounce 1.6s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(10px); }
  }

  /* --- Video / link section below --- */
  #more-section {
    max-width: 640px;
    margin: 60px auto 80px auto;
    padding: 0 20px;
    text-align: center;
  }

  #more-section h2 {
    color: #d9534f;
    font-size: 2rem;
    margin-bottom: 20px;
  }

  .video-wrapper {
    position: relative;
    width: 100%;
    padding-top: 56.25%; /* 16:9 aspect ratio */
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    background-color: #fff;
  }

  .video-wrapper iframe,
  .video-wrapper video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  .more-link {
    display: inline-block;
    margin-top: 25px;
    padding: 12px 24px;
    background-color: #d9534f;
    color: #fff;
    text-decoration: none;
    border-radius: 6px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: background-color 0.2s ease;
  }

  .more-link:hover {
    background-color: #c9302c;
  }
</style>
</head>
<body>

  <!-- Ambient floating hearts, filled in by JS below -->
  <div id="bg-hearts"></div>

  <!-- tiktok meowish -->
  <div class="envlope-wrapper">
    <div id="envelope" class="close">
      <div class="front flap"></div>
      <div class="front pocket"></div>
      <div class="letter">
        <div class="words line1">To: Darling</div>
        <div class="words line2">Dimple, you are so beautiful</div>
        <div class="words line3">That every time i see you</div>
        <div class="words line4">my world stops,</div>
      </div>
      <div class="hearts">
        <div class="heart a1"></div>
        <div class="heart a2"></div>
        <div class="heart a3"></div>
      </div>
    </div>
  </div>

  <div class="reset">
    <button id="open">Open</button>
    <button id="reset">Close</button>
    <button id="music-toggle">🔇 Music</button>
  </div>

  <div class="scroll-hint">
    <a href="#more-section" aria-label="Scroll down for more">⌄</a>
  </div>

  <!-- ============================================= -->
  <!-- Section below the fold: video + link          -->
  <!-- Edit the iframe src / video src and the link   -->
  <!-- href + text below to whatever you like.        -->
  <!-- ============================================= -->
  <div id="more-section">
    <h2>A little more for you 💌</h2>

    <div class="video-wrapper">
      <!-- Replace this iframe's src with your video embed (YouTube, etc.) -->
      <!-- <iframe src="" title="video" allowfullscreen></iframe> -->

      <!-- OR use a direct video file instead of the iframe above -->
      <video controls src="love.mp4"></video>
    </div>

    <a class="more-link" href="https://drive.google.com/file/d/1EOYrh-yFtvbKynt4x9Bm5Z2dx2EsxTH-/view?usp=drivesdk" target="_blank" rel="noopener">
      Click here 💕
    </a>
  </div>

  <!-- Background music: drop your audio file's path/URL into src below -->
  <audio id="bg-music" loop preload="none">
    <source src="song.mp3" type="audio/mpeg" />
  </audio>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script>
    $(document).ready(function () {
      var envelope = $("#envelope");
      var btn_open = $("#open");
      var btn_reset = $("#reset");
      var btn_music = $("#music-toggle");
      var music = document.getElementById("bg-music");
      var musicPlaying = false;

      envelope.click(function () {
        open();
      });
      btn_open.click(function () {
        open();
      });
      btn_reset.click(function () {
        close();
      });

      function open() {
        envelope.addClass("open").removeClass("close");
      }
      function close() {
        envelope.addClass("close").removeClass("open");
      }

      // --- Ambient floating background hearts ---
      var bgHeartsContainer = document.getElementById("bg-hearts");
      var heartCount = 18;
      for (var i = 0; i < heartCount; i++) {
        var h = document.createElement("div");
        h.className = "bg-heart";

        var left = Math.random() * 100; // vw %
        var size = 12 + Math.random() * 20; // px
        var floatDuration = 8 + Math.random() * 10; // seconds
        var swayDuration = 2 + Math.random() * 3; // seconds
        var delay = Math.random() * 12; // seconds

        h.style.left = left + "%";
        h.style.width = size + "px";
        h.style.height = size + "px";
        h.style.animationDuration = floatDuration + "s, " + swayDuration + "s";
        h.style.animationDelay = "-" + delay + "s, -" + (Math.random() * swayDuration) + "s";

        bgHeartsContainer.appendChild(h);
      }

      // --- Music toggle ---
      btn_music.click(function () {
        if (!music.src || music.src === window.location.href) {
          // no source has been set yet, nothing to play
          return;
        }
        if (musicPlaying) {
          music.pause();
          btn_music.text("🔇 Music");
        } else {
          music.play();
          btn_music.text("🔊 Music");
        }
        musicPlaying = !musicPlaying;
      });
    });
  </script>

</body>
</html>
